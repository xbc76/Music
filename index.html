let dragSourceEl = null;
function setupDragEvents(el) {
el.addEventListener('dragstart', handleDragStart, false);
el.addEventListener('dragenter', handleDragEnter, false);
el.addEventListener('dragover', handleDragOver, false);
el.addEventListener('dragleave', handleDragLeave, false);
el.addEventListener('drop', handleDrop, false);
el.addEventListener('dragend', handleDragEnd, false);
el.addEventListener('touchstart', handleTouchStart, {passive: false});
el.addEventListener('touchmove', handleTouchMove, {passive: false});
el.addEventListener('touchend', handleTouchEnd, false);
}
function handleDragStart(e) {
this.classList.add('dragging');
dragSourceEl = this;
e.dataTransfer.effectAllowed = 'move';
e.dataTransfer.setData('text/plain', this.dataset.id);
}
function handleDragOver(e) {
if (e.preventDefault) e.preventDefault();
e.dataTransfer.dropEffect = 'move';
return false;
}
function handleDragEnter(e) {
if (this !== dragSourceEl && this.dataset.type === dragSourceEl.dataset.type) {
this.classList.add('over');
}
}
function handleDragLeave(e) {
this.classList.remove('over');
}
function handleDrop(e) {
if (e.stopPropagation) e.stopPropagation();
if (dragSourceEl !== this && this.dataset.type === dragSourceEl.dataset.type) {
const listName = this.dataset.type;
const sourceId = dragSourceEl.dataset.id;
const targetId = this.dataset.id;
reorderItems(listName, sourceId, targetId);
}
return false;
}
function handleDragEnd(e) {
document.querySelectorAll('.org-item').forEach(el => {
el.classList.remove('dragging');
el.classList.remove('over');
});
}
function reorderItems(listName, sourceId, targetId) {
let list = (listName === 'db') ? DB : SECTIONS_MUSIC;
const fromIdx = list.findIndex(item => item.id === sourceId);
const toIdx = list.findIndex(item => item.id === targetId);
if (fromIdx !== -1 && toIdx !== -1) {
const [movedItem] = list.splice(fromIdx, 1);
list.splice(toIdx, 0, movedItem);
saveOrder();
render();
}
}
let touchStartY = 0;
let touchElement = null;
function handleTouchStart(e) {
if (e.target.closest('.org-drag-handle')) {
touchElement = this;
touchStartY = e.touches[0].clientY;
this.classList.add('dragging');
}
}
function handleTouchMove(e) {
if (!touchElement) return;
e.preventDefault();
const touchY = e.touches[0].clientY;
const target = document.elementFromPoint(e.touches[0].clientX, touchY);
const targetItem = target ? target.closest('.org-item') : null;
document.querySelectorAll('.org-item').forEach(el => el.classList.remove('over'));
if (targetItem && targetItem !== touchElement && targetItem.dataset.type === touchElement.dataset.type) {
targetItem.classList.add('over');
}
}
function handleTouchEnd(e) {
if (!touchElement) return;
const touchY = e.changedTouches[0].clientY;
const target = document.elementFromPoint(e.changedTouches[0].clientX, touchY);
const targetItem = target ? target.closest('.org-item') : null;
if (targetItem && targetItem !== touchElement && targetItem.dataset.type === touchElement.dataset.type) {
reorderItems(touchElement.dataset.type, touchElement.dataset.id, targetItem.dataset.id);
}
touchElement.classList.remove('dragging');
document.querySelectorAll('.org-item').forEach(el => el.classList.remove('over'));
touchElement = null;
}
function moveItem(listName, id, dir) {
let list = (listName === 'db') ? DB : SECTIONS_MUSIC;
const idx = list.findIndex(item => item.id === id);
if (idx === -1) return;
const newIdx = idx + dir;
if (newIdx < 0 || newIdx >= list.length) return;
const temp = list[idx];
list[idx] = list[newIdx];
list[newIdx] = temp;
saveOrder();
render();
}

async function doSearch() {
const query = searchInput.value.trim();
if (!query) return;
searchInput.blur();
document.getElementById('autocompleteResults').style.display = 'none';
searchResults = [];
currentPodcast = null;
currentAuthor = null;
APP.isSearchView = true;
APP.isSearching = true;
render(); // Increments APP.renderId
const rid = APP.renderId; // Capture the current valid ID
try {
if (currentMode === 'podcast') {
const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=podcast&limit=20`);
const data = await resp.json();
if (!isRenderValid(rid)) return;
searchResults = data.results.map(r => ({
id: 'pod-' + r.collectionId,
name: r.collectionName,
genre: r.primaryGenreName,
img: r.artworkUrl600 || r.artworkUrl100,
type: 'podcast',
bg: 'bg-dark'
}));
} else if (currentMode === 'audiobook') {
const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=audiobook&limit=40`);
const data = await resp.json();
if (!isRenderValid(rid)) return;
const seen = new Set();
searchResults = data.results.filter(r => {
if (!r.artistId || seen.has(r.artistId)) return false;
seen.add(r.artistId);
return true;
}).map(r => ({
id: 'auth-' + r.artistId,
artistId: r.artistId,
name: r.artistName,
genre: r.primaryGenreName,
img: r.artworkUrl600 || r.artworkUrl100,
type: 'author',
bg: 'bg-dark'
}));
}
} catch (err) {
if (isRenderValid(rid)) showToast('Error en la búsqueda');
} finally {
if (isRenderValid(rid)) {
APP.isSearching = false;
render(); // This will increment renderId again, which is fine as it's the final draw
}
}
}
