function showHelp(){toggleSettings();var o=document.getElementById('helpOverlay');o.style.display='flex';renderHelpTabs(0);}
function closeHelp(){document.getElementById('helpOverlay').style.display='none';}
function renderHelpTabs(i){var b=document.getElementById('helpTabBar');b.innerHTML=HELP_SECTIONS.map(function(s,j){return '<button class="help-tab'+(j===i?' on':'')+'" onclick="renderHelpTabs('+j+')">'+s.label+'</button>';}).join('');renderHelpContent(i);}
function renderHelpContent(i){var s=HELP_SECTIONS[i];var items=s.items.map(function(it){return '<div class="help-item"><div class="help-item-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">'+it.ico+'</svg></div><div class="help-item-body"><div class="help-item-title">'+it.title+'</div><div class="help-item-desc">'+it.desc+'</div></div></div>';}).join('');document.getElementById('helpContent').innerHTML='<div class="help-sec"><div class="help-illo">'+s.illo+'</div><div class="help-title">'+s.title+'</div><div class="help-sub">'+s.sub+'</div><div class="help-list">'+items+'</div></div>';}
</script>

    <div id="carModeOverlay">
      <div class="car-top">
        <div class="car-top-left">
          <button class="car-theme-btn" id="carThemeBtn" onclick="cycleCarTheme()" title="Cambiar tema"></button>
        </div>
        <div id="carClock" class="car-clock">00:00</div>
        <div class="car-top-right">
          <button class="car-exit" onclick="toggleCarMode()" title="Salir del modo auto"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 00-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z"/></svg></button>

            <button class="car-pl-icon active" id="carPlIconAll" data-pl="all" onclick="carSetPlaylist('all')" title="Todas">

            <span id="carPlayLabel" class="car-btn-label"></span>

<div id="helpOverlay" style="position:fixed;inset:0;background:var(--bg);z-index:2000;display:none;flex-direction:column;overflow:hidden">
  <div style="display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--hv);flex-shrink:0">
    <button onclick="closeHelp()" style="background:none;border:none;color:var(--sb);cursor:pointer;padding:6px;display:flex;align-items:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
    <h2 style="font-size:20px;font-weight:900;color:var(--p)">Instrucciones</h2>
  </div>
  <div id="helpTabBar" style="display:flex;gap:6px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--hv);flex-shrink:0;scrollbar-width:none"></div>
  <div id="helpContent" style="flex:1;overflow-y:auto;padding:0 0 80px;-webkit-overflow-scrolling:touch"></div>
</div>
